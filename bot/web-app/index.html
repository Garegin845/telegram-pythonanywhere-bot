<style>
*{
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    margin:0;
    background:#0b0b0f;
    color:white;
}

.header{
    padding:20px;
    text-align:center;
    background:linear-gradient(135deg,#171720,#292942);
}

.logo{
    font-size:35px;
}

h1{

    border:0;
    padding:12px 25px;
    border-radius:20px;
    font-weight:bold;
    cursor:pointer;
}


.section{
    padding:15px;
}

.cards{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}


.card{
    background:#17171f;
    border-radius:15px;
    overflow:hidden;
    padding-bottom:10px;
}


.card img{
    width:100%;
    height:150px;
    object-fit:cover;
}


.card h3{
    margin:8px;
}


.watch{
    margin:8px;
    background:#e50914;
    border:0;
    color:white;
    padding:8px;
    width:90%;
    border-radius:10px;
}


footer{

    padding:20px;
    color:#888;
}
